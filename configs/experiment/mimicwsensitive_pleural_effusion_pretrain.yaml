# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: mimicwsensitive
  - override /model: mimicwsensitive
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mimic"]

seed: 42

trainer:
  min_epochs: 1
  max_epochs: 10
  gradient_clip_val: 0.5

model:
  optimizer:
    lr: 0.000160
    weight_decay: 0.000775
  compile: false
  loss_weight_class_0: 1.0

data:
  batch_size: 128
  train_data_path: ${paths.root_dir}/data/MIMIC/Pleural_Effusion/ViewPosition_binary/1.0/train_60_42.csv
  val_data_path: ${paths.root_dir}/data/MIMIC/Pleural_Effusion/ViewPosition_binary/1.0/val_60_42.csv
  test_data_path: ${paths.root_dir}/data/MIMIC/Pleural_Effusion/test_labels_pretrain_filtered2.csv.gz

callbacks:
  model_checkpoint:
    monitor: "val/bal_acc"
    mode: "max"

  early_stopping:
    monitor: "val/bal_acc"
    mode: "max"
    
logger:
  wandb:
    tags: ${tags}
    group: "mimic"
  aim:
    experiment: "mimic"
