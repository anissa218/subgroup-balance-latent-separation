# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: mimic
  - override /model: mimic
  - override /callbacks: default
  - override /trainer: default
  - override /scheduler: cosine_warmup

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mimic"]

seed: 42

trainer:
  min_epochs: 1
  max_epochs: 10
  gradient_clip_val: 0.5

model:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.000027
    weight_decay: 0.079224
  compile: false
  loss_weight_class_0: 1.0
  net: 
    _target_: src.models.components.vit_b_16.ViT_B16

data:
  batch_size: 64
  train_data_path: ${paths.root_dir}/data/MIMIC/Pleural_Effusion/train_labels_22353_42.csv.gz
  val_data_path: ${paths.root_dir}/data/MIMIC/Pleural_Effusion/val_labels_3722_42.csv.gz
  test_data_path: ${paths.root_dir}/data/MIMIC/Pleural_Effusion/test_labels.csv.gz

callbacks:
  model_checkpoint:
    monitor: "val/bal_acc"
    mode: "max"

  early_stopping:
    monitor: "val/bal_acc"
    mode: "max"
    
logger:
  wandb:
    tags: ${tags}
    group: "mimic"
  aim:
    experiment: "mimic"
