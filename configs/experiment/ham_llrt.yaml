# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: ham
  - override /model: ham
  - override /callbacks: default
  - override /trainer: default
  - override /scheduler: cosine_warmup

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["ham"]

seed: 42

trainer:
  min_epochs: 1
  max_epochs: 50
  gradient_clip_val: 0.5

model:
  net:
    _target_: src.models.components.vit_b_16.ViT_B16
    freeze_backbone: true
  optimizer:
    _target_: torch.optim.AdamW 
    lr: 0.00012 # 0.000065
    weight_decay: 0.001925
  compile: false
  loss_weight_class_0: 1.0

data:
  batch_size: 256
  train_data_path: ${paths.data_dir}/HAM10000/Random_binary/train_0_42.csv
  val_data_path: ${paths.data_dir}/HAM10000/Random_binary/val_0_42.csv
  test_data_path: ${paths.data_dir}/HAM10000/test_labels.csv

callbacks:
  model_checkpoint:
    monitor: "val/bal_acc"
    mode: "max"

  early_stopping:
    monitor: "val/bal_acc"
    mode: "max"
    patience: 10
    
logger:
  wandb:
    tags: ${tags}
    group: "ham"
  aim:
    experiment: "ham"

