# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: mimic
  - override /model: mimic
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mimic"]

seed: 42

trainer:
  min_epochs: 1
  max_epochs: 20
  gradient_clip_val: 0.5

model:
  optimizer:
    lr: 0.0006 #0.000158
    weight_decay: 0.000775
  compile: false
  loss_weight_class_0: 1.0
  net:
    freeze_backbone: true

data:
  batch_size: 64
  train_data_path: ${paths.root_dir}/data/MIMIC/Pleural_Effusion/ViewPosition_binary/1.0/train_0_42.csv
  val_data_path: ${paths.root_dir}/data/MIMIC/Pleural_Effusion/ViewPosition_binary/1.0/val_0_42.csv
  test_data_path: ${paths.root_dir}/data/MIMIC/Pleural_Effusion/test_labels_pretrain.csv.gz

callbacks:
  model_checkpoint:
    monitor: "val/acc"
    mode: "max"

  early_stopping:
    monitor: "val/acc"
    mode: "max"
    
logger:
  wandb:
    tags: ${tags}
    group: "mimic"
  aim:
    experiment: "mimic"

ckpt_path: '/gpfs3/well/papiez/users/hri611/python/data-centric-bias/logs/alloc_baseline_pretrain/runs/2025-09-04_09-14-49-654005/checkpoints/epoch_003.ckpt'
