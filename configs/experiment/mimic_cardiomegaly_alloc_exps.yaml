# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: mimic
  - override /model: mimic
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mimic"]

seed: 42

trainer:
  min_epochs: 1
  max_epochs: 6 # could probably put at 5, especially if it's necessary to run on gpu_short queue
  gradient_clip_val: 0.5

model:
  optimizer:
    lr: 0.000316
    weight_decay: 0.000668
  compile: false

data:
  batch_size: 256
  train_data_path: ${paths.root_dir}/data/MIMIC/Cardiomegaly/train_labels_22267.csv.gz
  val_data_path: ${paths.root_dir}/data/MIMIC/Cardiomegaly/val_labels_3547.csv.gz
  test_data_path: ${paths.root_dir}/data/MIMIC/Cardiomegaly/test_labels.csv.gz

callbacks:
  model_checkpoint:
    monitor: "val/bal_acc"
    mode: "max"

  early_stopping:
    monitor: "val/bal_acc"
    mode: "max"

logger:
  wandb:
    tags: ${tags}
    group: "mimic"
  aim:
    experiment: "mimic"
