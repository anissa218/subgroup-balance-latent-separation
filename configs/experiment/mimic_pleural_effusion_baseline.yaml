# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: mimic
  - override /model: mimic
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["mimic"]

seed: 42

trainer:
  min_epochs: 1
  max_epochs: 7 # could probably put at 5, especially if it's necessary to run on gpu_short queue
  gradient_clip_val: 0.5

model:
  optimizer:
    lr: 0.00015428388141273573
    weight_decay: 0.000337033877581107
  # net:
  #   lin1_size: 128
  #   lin2_size: 256
  #   lin3_size: 64
  compile: false

data:
  batch_size: 256

callbacks:
  model_checkpoint:
    monitor: "val/bal_acc"
    mode: "max"

  early_stopping:
    monitor: "val/bal_acc"
    mode: "max"
    
logger:
  wandb:
    tags: ${tags}
    group: "mimic"
  aim:
    experiment: "mimic"
